name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
    
    - name: Restore NuGet packages
      run: nuget restore CyberBotPart1.sln
      continue-on-error: true
    
    - name: Build solution
      run: msbuild CyberBotPart1.sln /p:Configuration=Release /p:Platform="Any CPU"
      continue-on-error: true
