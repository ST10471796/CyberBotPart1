name: CI - File Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-files:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check required files exist
      run: |
        echo "🔍 Checking project files..."
        echo ""
        
        # Check each file
        if [ -f "Program.cs" ]; then
          echo "✅ Program.cs found"
        else
          echo "❌ Program.cs MISSING"
          exit 1
        fi
        
        if [ -f "ResponseManager.cs" ]; then
          echo "✅ ResponseManager.cs found"
        else
          echo "⚠️ ResponseManager.cs not found (optional)"
        fi
        
        if [ -f "AudioManager.cs" ]; then
          echo "✅ AudioManager.cs found"
        else
          echo "⚠️ AudioManager.cs not found (optional)"
        fi
        
        if [ -f "Resources/greeting.wav" ]; then
          echo "✅ greeting.wav found"
        else
          echo "⚠️ greeting.wav not found (optional)"
        fi
        
        echo ""
        echo "🎉 File check completed successfully!"
    
    - name: Check C# syntax
      run: |
        echo "🔍 Checking C# syntax..."
        # This just verifies files have .cs extension
        find . -name "*.cs" -type f | while read file; do
          echo "✅ Found: $file"
        done
        echo "✅ Syntax check passed (basic validation)"
